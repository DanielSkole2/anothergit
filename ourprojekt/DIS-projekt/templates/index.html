<!DOCTYPE html>
<html>
<head>
    <title>Gaming vs Studying</title>

    <style>
        h1 {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 50px;
            color: white;
            margin-top: 0;
        }

        body {
            background-image: url("../static/n.jpg");
            background-size: 100%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        .card {
            width: 430px;
            padding: 30px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            color: white;
        }

        label {
            color: white;
        }

        select {
            width: 175px;
            height: 30px;
            font-size: 15px;
        }

        input {
            width: 170px;
            height: 25px;
            font-size: 15px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
        }

        .result-box {
            margin-top: 20px;
            color: white;
            display: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Grade predictor</h1>

        <form action="/calculate" method="POST">
            <label>Gender</label><br>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select><br><br>

            <label>Age (Range: 16-25)</label><br>
            <input type="number" name="age" min="16" max="25" placeholder="16-25" required><br><br>

            <label>Studying pr.hour (Range: 0-10)</label><br>
            <input type="number" name="studying" min="0" max="10" step="0.1" placeholder="0-10" required><br><br>

            <label>Gaming pr.hour (Range: 0-10)</label><br>
            <input type="number" name="gaming" min="0" max="10" step="0.1" placeholder="0-10" required><br><br>

            <label>Sleeping pr.hour (Range: 0-10)</label><br>
            <input type="number" name="sleeping" min="0" max="10" step="0.1" placeholder="0-10" required><br><br>

            <button type="submit">Calculate</button>
        </form>

        <div id="resultBox" class="result-box">
            <hr>
            <p><strong>Database Analysis:</strong> <span id="resultText"></span></p>
            <p id="studentText"></p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        const result = params.get("result");
        const studentCount = params.get("student_count");

        if (result) {
            document.getElementById("resultBox").style.display = "block";
            document.getElementById("resultText").textContent = result;

            if (studentCount) {
                document.getElementById("studentText").textContent =
                    "(Calculated based on " + studentCount + " students with a similar profile to yours)";
            }
        }
    </script>
</body>
</html>
