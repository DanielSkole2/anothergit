<!DOCTYPE html>
<html>
<head>
    <title>Gaming vs Studying</title>

    <style>
        h1 {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 50px;
            color: white;
            margin-top: 0;
        }

        body {
            background-image: url("../static/n.jpg");
            background-size: 100%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        .card {
            width: 430px;
            padding: 30px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            color: white;
        }

        label {
            color: white;
        }

        select {
            width: 175px;
            height: 30px;
            font-size: 15px;
        }

        input {
            width: 170px;
            height: 25px;
            font-size: 15px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
        }

        .result-box {
            margin-top: 20px;
            color: white;
            display: none;
        }

        .chart-box {
            width: 100%;
            max-width: 600px;
            margin: 20px 0;
            background: white;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }

        #gaussChart {
            width: 100%;
            height: 300px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Grade predictor</h1>

        <form action="/calculate" method="POST">
            <label>Gender</label><br>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select><br><br>

            <label>Age (Range: 16-25)</label><br>
            <input type="number" name="age" min="16" max="25" placeholder="16-25" required><br><br>

            <label>Studying pr.hour (Range: 0-10)</label><br>
            <input type="number" name="studying" min="0" max="10" step="0.1" placeholder="0-10" required><br><br>

            <label>Gaming pr.hour (Range: 0-10)</label><br>
            <input type="number" name="gaming" min="0" max="10" step="0.1" placeholder="0-10" required><br><br>

            <label>Sleeping pr.hour (Range: 0-10)</label><br>
            <input type="number" name="sleeping" min="0" max="10" step="0.1" placeholder="0-10" required><br><br>

            <button type="submit">Calculate</button>
        </form>

        <div id="resultBox" class="result-box">
            <hr>
            <p><strong>Database Analysis:</strong> <span id="resultText"></span></p>
            <p id="studentText"></p>

            <div id="chartBox" class="chart-box">
                <canvas id="gaussChart" width="600" height="300"></canvas>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        const result = params.get("result");
        const studentCount = params.get("student_count");
        const mean = Number(params.get("chart_mean"));
        const std = Number(params.get("chart_std"));

        if (result) {
            document.getElementById("resultBox").style.display = "block";
            document.getElementById("resultText").textContent = result;

            if (studentCount) {
                document.getElementById("studentText").textContent =
                    "(Calculated based on " + studentCount + " students with a similar profile to yours)";
            }

            if (!isNaN(mean) && !isNaN(std) && std > 0) {
                document.getElementById("chartBox").style.display = "block";
                drawCurve(mean, std);
            }
        }

        function normalValue(x, mean, std) {
            let top = Math.exp(-((x - mean) * (x - mean)) / (2 * std * std));
            let bottom = std * Math.sqrt(2 * Math.PI);
            return top / bottom;
        }

        function drawCurve(mean, std) {
            const canvas = document.getElementById("gaussChart");
            const ctx = canvas.getContext("2d");

            const width = canvas.width;
            const height = canvas.height;

            const left = 45;
            const right = 20;
            const top = 25;
            const bottom = 45;

            const graphWidth = width - left - right;
            const graphHeight = height - top - bottom;

            let points = [];
            let highest = 0;

            for (let grade = 0; grade <= 100; grade++) {
                let value = normalValue(grade, mean, std);
                points.push(value);

                if (value > highest) {
                    highest = value;
                }
            }

            ctx.clearRect(0, 0, width, height);

            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, width, height);

            ctx.strokeStyle = "black";
            ctx.lineWidth = 1;

            ctx.beginPath();
            ctx.moveTo(left, top);
            ctx.lineTo(left, top + graphHeight);
            ctx.lineTo(left + graphWidth, top + graphHeight);
            ctx.stroke();

            ctx.fillStyle = "black";
            ctx.font = "12px Arial";
            ctx.textAlign = "center";

            for (let grade = 0; grade <= 100; grade += 10) {
                let x = left + (grade / 100) * graphWidth;

                ctx.beginPath();
                ctx.moveTo(x, top + graphHeight);
                ctx.lineTo(x, top + graphHeight + 5);
                ctx.stroke();

                ctx.fillText(grade, x, top + graphHeight + 20);
            }

            ctx.font = "14px Arial";
            ctx.fillText("Grade %", left + graphWidth / 2, height - 10);

            ctx.beginPath();

            for (let grade = 0; grade <= 100; grade++) {
                let x = left + (grade / 100) * graphWidth;
                let y = top + graphHeight - (points[grade] / highest) * graphHeight;

                if (grade === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.strokeStyle = "blue";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = "black";
            ctx.font = "16px Arial";
            ctx.fillText("Grade Distribution (Gauss Curve)", width / 2, 16);
        }
    </script>
</body>
</html>
